border-radius:7px;padding:10px 12px;font:400 12px system-ui;color:#b91c1c;\">This reverses inventory and revenue impact via additive adjustments. The original entries stay in the ledger for audit. Voiding a membership payment does not cancel the membership.<\u002Fdiv>\n          <label style=\"display:flex;flex-direction:column;gap:6px;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;\">Reason (required)<input placeholder=\"e.g. duplicate entry\" style=\"width:100%;border:1px solid #d4d4d8;border-radius:6px;padding:9px 11px;font:400 13px system-ui;color:#27272a;\"><\u002Flabel>\n          <div style=\"display:flex;gap:8px;justify-content:flex-end;\"><button onclick=\"{{ closeModal }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:9px 14px;font:500 13px system-ui;color:#52525b;cursor:pointer;\">Cancel<\u002Fbutton><button onclick=\"{{ closeModal }}\" style=\"background:#b91c1c;color:#fff;border:1px solid #b91c1c;border-radius:6px;padding:9px 14px;font:600 13px system-ui;cursor:pointer;\">Confirm void<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820},&quot;navStyle&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Sidebar&quot;,&quot;Icon rail&quot;,&quot;Top tabs&quot;],&quot;default&quot;:&quot;Sidebar&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Compact&quot;,&quot;Comfortable&quot;,&quot;Spacious&quot;],&quot;default&quot;:&quot;Comfortable&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;view&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Auto&quot;,&quot;Desktop&quot;,&quot;Mobile&quot;],&quot;default&quot;:&quot;Auto&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = { screen:'dashboard', modal:null, profileTab:'membership', posTab:'register', invTab:'products', reportTab:'revenue', viewport:'desktop', period:'month', dashEmpty:false };\n\n  componentDidMount(){\n    this._r = () => {\n      const vp = window.innerWidth < 760 ? 'mobile' : 'desktop';\n      if (vp !== this.state.viewport) this.setState({ viewport: vp });\n    };\n    window.addEventListener('resize', this._r);\n    this._r();\n  }\n  componentWillUnmount(){ window.removeEventListener('resize', this._r); }\n\n  go(s){ this.setState({ screen: s, modal: null }); }\n  setTab(k, v){ this.setState({ [k]: v }); }\n  openModal(m){ this.setState({ modal: m }); }\n  closeModal(){ this.setState({ modal: null }); }\n\n  badge(label){\n    const l = (label || '').toLowerCase();\n    let c;\n    if (/(active|member|completed|paid|in stock|healthy)/.test(l)) c = ['#ecfdf5','#047857','#a7f3d0'];\n    else if (/(expired|void|archived|sale|out)/.test(l)) c = ['#fef2f2','#b91c1c','#fecaca'];\n    else if (/(expiring|walk|low|adjust|purchase|day)/.test(l)) c = ['#fffbeb','#b45309','#fde68a'];\n    else c = ['#f4f4f5','#52525b','#e4e4e7'];\n    return { display:'inline-block', padding:'2px 9px', borderRadius:'999px', font:'600 11px system-ui', whiteSpace:'nowrap', background:c[0], color:c[1], border:'1px solid '+c[2] };\n  }\n\n  tabStyle(active){\n    return active\n      ? { background:'transparent', border:'none', borderBottom:'2px solid #3f6fb5', padding:'9px 4px', margin:'0 8px', font:'600 13px system-ui', color:'#3f6fb5', cursor:'pointer' }\n      : { background:'transparent', border:'none', borderBottom:'2px solid transparent', padding:'9px 4px', margin:'0 8px', font:'500 13px system-ui', color:'#71717a', cursor:'pointer' };\n  }\n  pillStyle(active){\n    return active\n      ? { background:'#eef3fb', border:'1px solid #cdddf3', borderRadius:'7px', padding:'8px 13px', font:'600 12px system-ui', color:'#3f6fb5', cursor:'pointer', whiteSpace:'nowrap' }\n      : { background:'#fff', border:'1px solid #d4d4d8', borderRadius:'7px', padding:'8px 13px', font:'500 12px system-ui', color:'#52525b', cursor:'pointer', whiteSpace:'nowrap' };\n  }\n  chip(active){\n    return active\n      ? { font:'500 12px system-ui', color:'#3f6fb5', background:'#eef3fb', border:'1px solid #cdddf3', borderRadius:'6px', padding:'6px 11px', cursor:'pointer', whiteSpace:'nowrap' }\n      : { font:'500 12px system-ui', color:'#52525b', background:'#fff', border:'1px solid #d4d4d8', borderRadius:'6px', padding:'6px 11px', cursor:'pointer', whiteSpace:'nowrap' };\n  }\n  voidBtn(disabled){\n    return disabled\n      ? { background:'#fafafa', border:'1px solid #efefef', borderRadius:'6px', padding:'5px 10px', font:'500 12px system-ui', color:'#c4c4c8', cursor:'default' }\n      : { background:'#fff', border:'1px solid #d4d4d8', borderRadius:'6px', padding:'5px 10px', font:'500 12px system-ui', color:'#52525b', cursor:'pointer' };\n  }\n\n  renderVals(){\n    const density = this.props.density || 'Comfortable';\n    const navStyle = this.props.navStyle || 'Sidebar';\n    const viewPref = this.props.view || 'Auto';\n    const mobile = viewPref === 'Mobile' || (viewPref === 'Auto' && this.state.viewport === 'mobile');\n    const layout = mobile ? 'mobile' : navStyle;\n    const isSidebar = layout === 'Sidebar';\n    const isRail = layout === 'Icon rail';\n    const isTop = layout === 'Top tabs';\n    const isMobile = layout === 'mobile';\n    const horizontal = isTop || isMobile;\n    const showLabel = isSidebar || isTop || isMobile;\n    const ACCENT = '#3f6fb5';\n\n    let navContainerStyle, itemBase;\n    if (isSidebar) {\n      navContainerStyle = { width:'216px', flex:'0 0 216px', display:'flex', flexDirection:'column', gap:'2px', padding:'14px 12px', background:'#fafafa', borderRight:'1px solid #e4e4e7', order:0, overflowY:'auto' };\n      itemBase = { display:'flex', alignItems:'center', gap:'11px', width:'100%', padding:'9px 11px', borderRadius:'7px', border:'1px solid transparent', background:'transparent', font:'500 13px system-ui', color:'#52525b', cursor:'pointer', textAlign:'left' };\n    } else if (isRail) {\n      navContainerStyle = { width:'62px', flex:'0 0 62px', display:'flex', flexDirection:'column', gap:'4px', padding:'14px 8px', alignItems:'center', background:'#fafafa', borderRight:'1px solid #e4e4e7', order:0, overflowY:'auto' };\n      itemBase = { display:'flex', alignItems:'center', justifyContent:'center', width:'46px', height:'46px', borderRadius:'9px', border:'1px solid transparent', background:'transparent', cursor:'pointer' };\n    } else if (isTop) {\n      navContainerStyle = { display:'flex', flexDirection:'row', gap:'4px', padding:'8px 16px', background:'#fafafa', borderBottom:'1px solid #e4e4e7', order:0, alignItems:'center', overflowX:'auto' };\n      itemBase = { display:'flex', alignItems:'center', gap:'8px', padding:'8px 13px', borderRadius:'7px', border:'1px solid transparent', background:'transparent', font:'500 13px system-ui', color:'#52525b', cursor:'pointer', whiteSpace:'nowrap' };\n    } else {\n      navContainerStyle = { display:'flex', flexDirection:'row', justifyContent:'space-between', gap:'2px', padding:'6px', background:'#fff', borderTop:'1px solid #e4e4e7', order:2, flex:'none', overflowX:'auto' };\n      itemBase = { display:'flex', flexDirection:'column', alignItems:'center', gap:'3px', flex:'1', minWidth:'52px', padding:'5px 2px', borderRadius:'8px', border:'1px solid transparent', background:'transparent', color:'#71717a', cursor:'pointer', font:'500 10px system-ui' };\n    }\n\n    const rootStyle = { display:'flex', flexDirection: horizontal ? 'column' : 'row', height:'100vh', width:'100%', background:'#f4f4f5', fontFamily:'system-ui,-apple-system,Segoe UI,Roboto,sans-serif', color:'#27272a', overflow:'hidden' };\n    const mainStyle = { flex:'1 1 auto', display:'flex', flexDirection:'column', minWidth:0, minHeight:0, order:1, overflow:'hidden' };\n\n    const navDef = [\n      { id:'dashboard', label:'Dashboard', icon:'\\u25A6' },\n      { id:'clients', label:'Clients', icon:'\\u25C9' },\n      { id:'attendance', label:'Check-in', icon:'\\u2713' },\n      { id:'payments', label:'Payments', icon:'\\u20B1' },\n      { id:'pos', label:'POS', icon:'\\u25A4' },\n      { id:'inventory', label:'Inventory', icon:'\\u25A3' },\n      { id:'reports', label:'Reports', icon:'\\u25A5' },\n      { id:'settings', label:'Settings', icon:'\\u25C7' },\n    ];\n    const activeScreen = this.state.screen === 'clientProfile' ? 'clients' : this.state.screen;\n    const nav = navDef.map(n => {\n      const active = n.id === activeScreen;\n      const style = Object.assign({}, itemBase);\n      if (active) {\n        if (isMobile) { style.color = ACCENT; }\n        else { style.background = '#eef3fb'; style.borderColor = '#cdddf3'; style.color = ACCENT; style.fontWeight = 600; }\n      }\n      const iconStyle = { font:'16px ui-monospace,Menlo,monospace', lineHeight:1, color: active ? ACCENT : '#a1a1aa' };\n      return { id:n.id, label:n.label, icon:n.icon, onClick: () => this.go(n.id), style, iconStyle };\n    });\n\n    const twoColTemplate = mobile ? '1fr' : '1fr 1fr';\n    const posTemplate = mobile ? '1fr' : '1.5fr 1fr';\n    const gridCols = mobile ? 'repeat(2,1fr)' : 'repeat(3,1fr)';\n\n    const titles = { dashboard:'Dashboard', clients:'Clients', clientProfile:'Client Profile', attendance:'Check-in & Attendance', payments:'Client Payments', pos:'Point of Sale', inventory:'Inventory', reports:'Reports', settings:'Settings' };\n\n    // ===== Clients =====\n    const clients = [\n      { name:'Maria Santos', contact:'0917 555 0142', status:'Active', last:'Today 7:14a', joined:'Nov 3, 2024' },\n      { name:'John Cruz', contact:'0905 221 8890', status:'Expiring soon', last:'Yesterday', joined:'Jan 20, 2025' },\n      { name:'John Cruz', contact:'\\u2014', status:'Walk-in', last:'Mar 18', joined:'Mar 11, 2026' },\n      { name:'Aileen Reyes', contact:'0928 777 4521', status:'Expired', last:'Apr 02', joined:'Aug 15, 2024' },\n      { name:'Marco Dela Cruz', contact:'0916 333 1209', status:'Active', last:'Today 6:02p', joined:'Dec 1, 2025' },\n    ].map(c => ({ ...c, statusStyle: this.badge(c.status) }));\n\n    const lowStock = [\n      { name:'Bottled Water', remaining:'5 units', threshold:'12' },\n      { name:'Gold Std Whey', remaining:'8 of 70 servings', threshold:'10' },\n      { name:'Electrolyte Mix', remaining:'3 servings', threshold:'8' },\n    ].map(p => ({ ...p, statusStyle: this.badge('low') }));\n\n    // ===== Products (POS catalog + inventory) =====\n    const productSeed = [\n      { name:'Bottled Water', cat:'Beverages', type:'Standard', sell:'\\u20B125', cost:'\\u20B115', stock:'5', threshold:'12', active:true, low:true },\n      { name:'Gatorade', cat:'Beverages', type:'Standard', sell:'\\u20B145', cost:'\\u20B130', stock:'24', threshold:'10', active:true, low:false },\n      { name:'Sting Energy', cat:'Beverages', type:'Standard', sell:'\\u20B125', cost:'\\u20B116', stock:'18', threshold:'10', active:true, low:false },\n      { name:'Gold Standard Whey', cat:'Supplements', type:'Serving', sell:'\\u20B150', cost:'\\u20B132', stock:'8 of 70', threshold:'10', active:true, low:true },\n      { name:'Pre-Workout', cat:'Supplements', type:'Serving', sell:'\\u20B190', cost:'\\u20B160', stock:'31 of 40', threshold:'8', active:true, low:false },\n      { name:'Protein Bar', cat:'Snacks', type:'Standard', sell:'\\u20B170', cost:'\\u20B145', stock:'18', threshold:'6', active:true, low:false },\n      { name:'Creatine (old SKU)', cat:'Supplements', type:'Serving', sell:'\\u20B160', cost:'\\u20B140', stock:'0 of 60', threshold:'8', active:false, low:false },\n    ];\n    const products = productSeed.map(p => ({\n      ...p,\n      typeLabel: p.type === 'Serving' ? 'Per serving' : 'Per unit',\n      stock: p.stock + (p.type === 'Serving' ? '' : (' ' + 'units')),\n      stockStyle: this.badge(p.low ? 'low' : (p.active ? 'in stock' : 'archived')),\n      activeLabel: p.active ? 'Active' : 'Archived',\n      activeStyle: this.badge(p.active ? 'active' : 'archived'),\n    }));\n\n    const STRIPE = 'repeating-linear-gradient(45deg,#f1f1f3,#f1f1f3 7px,#e7e7ea 7px,#e7e7ea 14px)';\n    const posGrid = productSeed.filter(p => p.active).map(p => ({\n      name:p.name,\n      priceLabel: p.sell + ' / ' + (p.type === 'Serving' ? 'serving' : 'unit'),\n      imgLabel: p.cat,\n      imgStyle: { height:'62px', background:STRIPE, display:'flex', alignItems:'flex-end', justifyContent:'flex-start', padding:'5px' },\n    }));\n\n    const catChips = ['All','Beverages','Supplements','Snacks'].map((c,i) => ({ label:c, style: this.chip(i===0) }));\n    const methodChips = ['All','Cash','GCash','Card','Other'].map((m,i) => ({ label:m, style: this.chip(i===0) }));\n\n    // ===== Client payments (CLIENT_TRANSACTION: membership + walk-in only) =====\n    const clientTxns = [\n      { date:'Jun 22 \\u00B7 7:14a', client:'Maria Santos', summary:'1 Month Membership', total:'\\u20B11,200', method:'GCash', status:'Completed' },\n      { date:'Jun 22 \\u00B7 6:40a', client:'Guest (walk-in)', summary:'Walk-in fee', total:'\\u20B160', method:'Cash', status:'Completed' },\n      { date:'Jun 21 \\u00B7 5:20p', client:'Aileen Reyes', summary:'Walk-in fee', total:'\\u20B160', method:'Card', status:'Void' },\n      { date:'Jun 20 \\u00B7 8:11a', client:'John Cruz', summary:'3 Month Membership (Renewal)', total:'\\u20B13,200', method:'GCash', status:'Completed' },\n      { date:'Jun 19 \\u00B7 9:02a', client:'Liza Tan', summary:'Walk-in fee + 1 Month Membership', total:'\\u20B11,260', method:'Cash', status:'Completed' },\n    ].map(t => { const voided = t.status === 'Void'; return { ...t, statusStyle: this.badge(t.status), voidStyle: this.voidBtn(voided), voidLabel: voided ? 'Voided' : 'Void' }; });\n\n    // ===== POS sales (POS_SALE: product only, no client) =====\n    const posTxns = [\n      { date:'Jun 22 \\u00B7 6:50a', summary:'Bottled Water \\u00D72, Gatorade \\u00D71', total:'\\u20B195', method:'Cash', status:'Completed' },\n      { date:'Jun 22 \\u00B7 6:10a', summary:'Whey Protein \\u00D71 scoop', total:'\\u20B150', method:'GCash', status:'Completed' },\n      { date:'Jun 21 \\u00B7 7:30p', summary:'Sting Energy \\u00D72', total:'\\u20B150', method:'Cash', status:'Completed' },\n      { date:'Jun 21 \\u00B7 6:02p', summary:'Pre-Workout \\u00D71', total:'\\u20B190', method:'Cash', status:'Void' },\n      { date:'Jun 20 \\u00B7 5:40p', summary:'Protein Bar \\u00D71, Water \\u00D71', total:'\\u20B195', method:'GCash', status:'Completed' },\n    ].map(t => { const voided = t.status === 'Void'; return { ...t, statusStyle: this.badge(t.status), voidStyle: this.voidBtn(voided), voidLabel: voided ? 'Voided' : 'Void' }; });\n\n    const posCart = [\n      { desc:'Bottled Water', meta:'\\u20B125 / unit', qty:'2', amount:'\\u20B150' },\n      { desc:'Gold Standard Whey', meta:'\\u20B150 / scoop', qty:'1', amount:'\\u20B150' },\n      { desc:'Protein Bar', meta:'\\u20B170 / unit', qty:'1', amount:'\\u20B170' },\n    ];\n    const posTotal = '\\u20B1170';\n\n    const recentCheckins = [\n      { name:'Maria Santos', time:'7:14a', type:'Member', plan:'1 Month \\u00B7 ends Jul 20' },\n      { name:'Walk-in (Guest)', time:'6:40a', type:'Walk-in', plan:'\\u20B160 fee charged' },\n      { name:'Marco Dela Cruz', time:'6:02a', type:'Member', plan:'2 Month \\u00B7 ends Aug 01' },\n      { name:'John Cruz', time:'Yest. 6:30p', type:'Member', plan:'3 Month \\u00B7 ends Jun 26' },\n    ].map(a => ({ ...a, statusStyle: this.badge(a.type) }));\n\n    const memHistory = [\n      { plan:'3 Month (Renewal)', dates:'Mar 26 \\u2013 Jun 26, 2026', price:'\\u20B13,200', status:'Active' },\n      { plan:'1 Month', dates:'Feb 24 \\u2013 Mar 24, 2026', price:'\\u20B11,200', status:'Expired' },\n      { plan:'1 Month', dates:'Jan 20 \\u2013 Feb 20, 2026', price:'\\u20B11,200', status:'Expired' },\n    ].map(m => ({ ...m, statusStyle: this.badge(m.status) }));\n\n    const ledger = [\n      { product:'Gold Standard Whey', date:'Jun 22', note:'Restock \\u00B7 2 containers \\u00D7 70', type:'Purchase', delta:'+140', resulting:'148' },\n      { product:'Gold Standard Whey', date:'Jun 21', note:'Sale \\u00B7 POS #1043', type:'Sale', delta:'\\u22121', resulting:'8' },\n      { product:'Bottled Water', date:'Jun 21', note:'Sale \\u00B7 POS #1041', type:'Sale', delta:'\\u22122', resulting:'5' },\n      { product:'Bottled Water', date:'Jun 20', note:'Miscount correction', type:'Adjustment', delta:'\\u22123', resulting:'7' },\n      { product:'Energy Drink', date:'Jun 19', note:'Restock received', type:'Purchase', delta:'+24', resulting:'24' },\n    ].map(l => ({ ...l, typeStyle: this.badge(l.type) }));\n\n    // ===== Reports =====\n    const RD = {\n      revenue:{ title:'Revenue by source', cols:['Source','Today','This week','MTD'], rows:[\n        ['Membership','\\u20B14,400','\\u20B118,800','\\u20B168,200'],\n        ['Walk-in','\\u20B1540','\\u20B12,640','\\u20B19,180'],\n        ['Product (POS)','\\u20B1315','\\u20B11,980','\\u20B16,240'],\n        ['Total','\\u20B15,255','\\u20B123,420','\\u20B183,620'],\n      ], note:'Draws from CLIENT_TRANSACTION + POS_SALE \\u00B7 void excluded \\u00B7 price snapshots keep history accurate.' },\n      method:{ title:'Revenue by payment method', cols:['Method','Client payments','POS sales','Total'], rows:[\n        ['Cash','\\u20B122,400','\\u20B14,180','\\u20B126,580'],\n        ['GCash','\\u20B141,600','\\u20B11,620','\\u20B143,220'],\n        ['Card','\\u20B113,380','\\u20B1440','\\u20B113,820'],\n        ['Other','\\u20B10','\\u20B10','\\u20B10'],\n      ], note:'Spans both transaction types \\u00B7 reconcile cash vs digital collections.' },\n      category:{ title:'Revenue by product category', cols:['Category','Units / servings','Revenue'], rows:[\n        ['Beverages','398','\\u20B112,540'],\n        ['Supplements','114','\\u20B17,020'],\n        ['Snacks','96','\\u20B16,720'],\n      ], note:'POS product revenue grouped by ProductCategory.' },\n      attendance:{ title:'Attendance \\u2014 total vs unique', cols:['Period','Total check-ins','Unique visitors'], rows:[\n        ['Today','37','31'],\n        ['This week','248','176'],\n        ['MTD','1,024','612'],\n      ], note:'Same-day repeat check-ins counted in total, deduplicated in unique.' },\n      membership:{ title:'Membership status', cols:['Status','Count'], rows:[\n        ['Active','148'],\n        ['Expiring soon (\\u22645d)','9'],\n        ['Expired','61'],\n      ], note:'Filterable & CSV-exportable \\u00B7 drives renewal outreach.' },\n      products:{ title:'Best sellers', cols:['Product','Units / servings sold','Revenue'], rows:[\n        ['Bottled Water','210','\\u20B15,250'],\n        ['Energy Drink','184','\\u20B18,280'],\n        ['Protein Bar','96','\\u20B16,720'],\n        ['Whey Protein','70','\\u20B13,500'],\n        ['Pre-Workout','44','\\u20B13,960'],\n      ], note:'Ranked by both units/servings and revenue.' },\n      conversion:{ title:'Frequent walk-ins \\u2014 conversion opportunities', cols:['Client','Walk-in visits','Active membership'], rows:[\n        ['Guest (0917\\u20260142)','14','No'],\n        ['Rico Bautista','11','No'],\n        ['Tin Morales','9','No'],\n        ['Jay Andrada','7','No'],\n      ], note:'High visit count, no active membership \\u00B7 upsell targets.' },\n      inventory:{ title:'Inventory usage', cols:['Product','Sold','Restocked','Adjusted','Net change'], rows:[\n        ['Bottled Water','\\u2212210','+216','\\u22123','+3'],\n        ['Gold Standard Whey','\\u221262','+140','0','+78'],\n        ['Energy Drink','\\u2212184','+192','0','+8'],\n        ['Protein Bar','\\u221296','+96','\\u22122','\\u22122'],\n      ], note:'Surfaces discrepancies between expected and actual stock.' },\n    };\n    const reportTabsDef = [['revenue','By Source'],['method','By Method'],['category','By Category'],['attendance','Attendance'],['membership','Membership'],['products','Best Sellers'],['conversion','Frequent Walk-ins'],['inventory','Inventory Usage']];\n    const reportTabs = reportTabsDef.map(([id,label]) => ({ id, label, onClick: () => this.setTab('reportTab', id), style: this.pillStyle(this.state.reportTab === id) }));\n    const rt = this.state.reportTab;\n    const rd = RD[rt] || RD.revenue;\n    const reportCols = rd.cols;\n    const reportRows = rd.rows.map(cells => ({ cells: cells.map((text,ci) => ({ text, style: ci === 0\n      ? 'padding:12px 14px;font:500 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;'\n      : 'padding:12px 14px;font:400 13px system-ui;color:#52525b;border-bottom:1px solid #f4f4f5;' })) }));\n    const reportTimeBased = rt === 'revenue' || rt === 'attendance';\n\n    // ===== Dashboard (rich) data =====\n    const period = this.state.period || 'month';\n    const empty = !!this.state.dashEmpty;\n    const periodWord = { today:'today', week:'this week', month:'month-to-date' }[period];\n    const periodCaption = { today:'Today', week:'This week', month:'Month-to-date \\u00B7 Jun 1\\u201322 (partial month)' }[period];\n    const revCaption = { today:'Hourly revenue, \\u20B1', week:'Daily revenue, \\u20B1', month:'Daily revenue, \\u20B1 \\u00B7 MTD' }[period];\n\n    const xL = { today:['6a','8a','10a','12p','2p','4p','6p','8p'], week:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], month:['1','4','7','10','13','16','19','22'] }[period];\n\n    const revD = {\n      today:{ m:[0,1200,0,0,2400,1200,0,1200], w:[60,120,180,120,240,180,300,120], p:[0,75,150,225,150,300,225,150] },\n      week:{ m:[1200,0,2400,1200,3600,4800,1200], w:[480,540,360,600,720,900,300], p:[315,210,420,180,525,630,150] },\n      month:{ m:[3200,4400,2400,6000,4800,7200,5600,4400], w:[540,620,480,700,820,910,760,540], p:[280,360,300,420,520,610,540,315] },\n    }[period];\n    const revMax = Math.max.apply(null, revD.m.concat(revD.w, revD.p)) || 1;\n    const line = (vals,max) => { const n=vals.length, pl=8, pr=8, pt=14, pb=14, W=520, H=190, pw=W-pl-pr, ph=H-pt-pb; return vals.map((v,i)=>{ const x=pl+(n<=1?0:i*(pw/(n-1))); const y=pt+(1-(v/max))*ph; return x.toFixed(1)+','+y.toFixed(1); }).join(' '); };\n    const revSeries = [\n      { name:'Membership', color:'#3f6fb5', vals:revD.m },\n      { name:'Walk-In', color:'#047857', vals:revD.w },\n      { name:'Product', color:'#b45309', vals:revD.p },\n    ].map(s => ({ name:s.name, color:s.color, points: line(s.vals, revMax), dot:{ width:'12px', height:'3px', borderRadius:'2px', background:s.color, display:'inline-block' } }));\n    const gridLines = [0,1,2,3,4].map(k => ({ y:(14 + k*(162/4)).toFixed(1) }));\n    const xLabels = xL;\n\n    const memStatus = [ { name:'Active', count:148, color:'#047857' }, { name:'Expiring soon', count:9, color:'#b45309' }, { name:'Expired', count:61, color:'#b91c1c' } ];\n    const memTotal = memStatus.reduce((a,b)=>a+b.count,0);\n    const CIRC = 2*Math.PI*48; let acc = 0;\n    const donutSegs = memStatus.map(s => { const len = CIRC*(s.count/memTotal); const seg = { name:s.name, count:s.count, color:s.color, dash: len.toFixed(2)+' '+(CIRC-len).toFixed(2), offset:(-acc).toFixed(2), dot:{ width:'10px', height:'10px', borderRadius:'3px', background:s.color, display:'inline-block', flex:'none' } }; acc += len; return seg; });\n\n    const attD = {\n      today:{ m:[2,5,4,6,3,5,7,5], w:[1,2,1,3,2,1,2,1] },\n      week:{ m:[28,31,26,34,30,38,22], w:[6,8,5,9,7,12,4] },\n      month:{ m:[42,38,45,40,48,52,46,37], w:[8,10,7,11,9,13,10,6] },\n    }[period];\n    const attMax = Math.max.apply(null, attD.m.concat(attD.w)) || 1;\n    const attendance = xL.map((lab,i)=>({ label:lab, member:attD.m[i], walk:attD.w[i], memberH:(attD.m[i]/attMax*100).toFixed(1)+'%', walkH:(attD.w[i]/attMax*100).toFixed(1)+'%' }));\n\n    const tpD = {\n      today:[['Energy Drink',9],['Bottled Water',7],['Protein Bar',4],['Whey Protein',3],['Pre-Workout',2]],\n      week:[['Bottled Water',64],['Energy Drink',52],['Protein Bar',31],['Whey Protein',22],['Pre-Workout',14]],\n      month:[['Bottled Water',210],['Energy Drink',184],['Protein Bar',96],['Whey Protein',70],['Pre-Workout',44]],\n    }[period];\n    const tpMax = tpD[0][1] || 1;\n    const topProducts = tpD.map(p => ({ name:p[0], units:String(p[1]), widthPct:(p[1]/tpMax*100).toFixed(1)+'%' }));\n\n    const posFeed = [\n      { summary:'Bottled Water \\u00D72, Gatorade \\u00D71', method:'Cash', amount:'\\u20B195', ago:'6m ago' },\n      { summary:'Whey Protein \\u00D71 scoop', method:'GCash', amount:'\\u20B150', ago:'40m ago' },\n      { summary:'Sting Energy \\u00D72', method:'Cash', amount:'\\u20B150', ago:'1h ago' },\n      { summary:'Pre-Workout \\u00D71', method:'Cash', amount:'\\u20B190', ago:'2h ago' },\n      { summary:'Protein Bar \\u00D71, Water \\u00D71', method:'GCash', amount:'\\u20B195', ago:'Yesterday' },\n    ];\n\n    const expSeed = [ { name:'Paolo Gomez', ends:'Jun 24', d:2 }, { name:'John Cruz', ends:'Jun 26', d:4 }, { name:'Liza Tan', ends:'Jun 27', d:5 }, { name:'Ramon Yu', ends:'Jun 30', d:8 }, { name:'Cita Lim', ends:'Jul 04', d:12 } ];\n    const feedExpiring = expSeed.map(m => { const red = m.d < 7; const c = red ? { bg:'#fef2f2', fg:'#b91c1c', bd:'#fecaca', dot:'#dc2626' } : { bg:'#fffbeb', fg:'#b45309', bd:'#fde68a', dot:'#d97706' }; return { name:m.name, ends:m.ends, days:m.d+'d', dotStyle:{ width:'8px', height:'8px', borderRadius:'50%', background:c.dot, flex:'none', display:'inline-block' }, daysStyle:{ display:'inline-block', padding:'2px 9px', borderRadius:'999px', font:'600 11px system-ui', background:c.bg, color:c.fg, border:'1px solid '+c.bd, whiteSpace:'nowrap' } }; });\n\n    const feedStock = lowStock;\n\n    const periods = [ ['today','Today'], ['week','Week'], ['month','Month'] ].map(pp => ({ label:pp[1], onClick:()=>this.setState({ period:pp[0] }), style: period===pp[0] ? { background:'#3f6fb5', color:'#fff', border:'none', padding:'7px 15px', font:'600 12px system-ui', cursor:'pointer' } : { background:'#fff', color:'#52525b', border:'none', padding:'7px 15px', font:'500 12px system-ui', cursor:'pointer' } }));\n    const segDemo = (on) => on ? { background:'#27272a', color:'#fff', border:'none', padding:'7px 13px', font:'600 11px system-ui', cursor:'pointer' } : { background:'#fff', color:'#71717a', border:'none', padding:'7px 13px', font:'500 11px system-ui', cursor:'pointer' };\n\n    const kpiSeed = [\n      { label:'Active members', value:'148', delta:'+3 from last month', dir:'up' },\n      { label:\"Today's check-ins\", value:'37', delta:'+5 vs yesterday', dir:'up' },\n      { label:'MTD revenue', value:'\\u20B183,620', delta:'+12% vs last month', dir:'up' },\n      { label:'Expiring soon', value:'9', delta:'within 5 days', dir:'warn' },\n    ];\n    const kpis = kpiSeed.map(k => {\n      const warn = k.dir === 'warn';\n      const cardStyle = { background: warn ? '#fffbeb' : '#fff', border:'1px solid '+(warn ? '#fde68a' : '#e4e4e7'), borderRadius:'8px', padding:'16px', display:'flex', flexDirection:'column', gap:'7px' };\n      const valueStyle = { font:'700 28px system-ui', color: warn ? '#b45309' : '#27272a', lineHeight:1 };\n      let delta, deltaStyle;\n      if (empty) { delta = '\\u2014'; deltaStyle = { font:'500 11px system-ui', color:'#a1a1aa' }; }\n      else if (warn) { delta = k.delta; deltaStyle = { font:'600 11px system-ui', color:'#b45309' }; }\n      else { delta = '\\u25B2 '+k.delta; deltaStyle = { font:'600 11px system-ui', color:'#047857' }; }\n      return { label:k.label, value: empty ? '0' : k.value, valueStyle, delta, deltaStyle, cardStyle };\n    });\n\n    const kpiCols = mobile ? '1fr 1fr' : 'repeat(4,1fr)';\n    const chartTopCols = mobile ? '1fr' : '1.55fr 1fr';\n    const chartBotCols = mobile ? '1fr' : '1fr 1fr';\n    const feedCols = mobile ? '1fr' : 'repeat(3,1fr)';\n    const emptyBoxStyle = { height:'170px', border:'1px dashed #d4d4d8', borderRadius:'8px', display:'flex', alignItems:'center', justifyContent:'center', font:'500 12px ui-monospace,Menlo,monospace', color:'#a1a1aa' };\n    const emptyRowStyle = { padding:'28px 0', textAlign:'center', font:'500 12px ui-monospace,Menlo,monospace', color:'#a1a1aa' };\n\n    return {\n      isLogin: this.state.screen === 'login',\n      isApp: this.state.screen !== 'login',\n      isDashboard: this.state.screen === 'dashboard',\n      isClients: this.state.screen === 'clients',\n      isClientProfile: this.state.screen === 'clientProfile',\n      isAttendance: this.state.screen === 'attendance',\n      isPayments: this.state.screen === 'payments',\n      isPos: this.state.screen === 'pos',\n      isInventory: this.state.screen === 'inventory',\n      isReports: this.state.screen === 'reports',\n      isSettings: this.state.screen === 'settings',\n\n      nav, navContainerStyle, mainStyle, rootStyle, showLabel,\n      navBrand: isSidebar || isRail, brandFull: !isRail, topBrand: horizontal,\n      showSearch: !isMobile,\n      screenTitle: titles[this.state.screen] || '',\n      twoColTemplate, posTemplate, gridCols,\n\n      goDashboard: () => this.go('dashboard'),\n      goClients: () => this.go('clients'),\n      viewClient: () => this.go('clientProfile'),\n      goAttendance: () => this.go('attendance'),\n      goPayments: () => this.go('payments'),\n      goPos: () => this.go('pos'),\n      goInventory: () => this.go('inventory'),\n      login: () => this.go('dashboard'),\n      logout: () => this.go('login'),\n      openMembership: () => this.openModal('membership'),\n      openRestock: () => this.openModal('restock'),\n      openAdjust: () => this.openModal('adjust'),\n      openProduct: () => this.openModal('product'),\n      openVoid: () => this.openModal('void'),\n      closeModal: () => this.closeModal(),\n      anyModal: !!this.state.modal,\n      modalMembership: this.state.modal === 'membership',\n      modalRestock: this.state.modal === 'restock',\n      modalAdjust: this.state.modal === 'adjust',\n      modalProduct: this.state.modal === 'product',\n      modalVoid: this.state.modal === 'void',\n\n      tabMembership: this.state.profileTab === 'membership',\n      tabAttendance: this.state.profileTab === 'attendance',\n      setProfileMembership: () => this.setTab('profileTab','membership'),\n      setProfileAttendance: () => this.setTab('profileTab','attendance'),\n      tabMembershipStyle: this.tabStyle(this.state.profileTab === 'membership'),\n      tabAttendanceStyle: this.tabStyle(this.state.profileTab === 'attendance'),\n\n      posRegister: this.state.posTab === 'register',\n      posCatalog: this.state.posTab === 'catalog',\n      posHistory: this.state.posTab === 'history',\n      setPosRegister: () => this.setTab('posTab','register'),\n      setPosCatalog: () => this.setTab('posTab','catalog'),\n      setPosHistory: () => this.setTab('posTab','history'),\n      posRegisterStyle: this.pillStyle(this.state.posTab === 'register'),\n      posCatalogStyle: this.pillStyle(this.state.posTab === 'catalog'),\n      posHistoryStyle: this.pillStyle(this.state.posTab === 'history'),\n\n      invProducts: this.state.invTab === 'products',\n      invLedger: this.state.invTab === 'ledger',\n      setInvProducts: () => this.setTab('invTab','products'),\n      setInvLedger: () => this.setTab('invTab','ledger'),\n      invProductsStyle: this.pillStyle(this.state.invTab === 'products'),\n      invLedgerStyle: this.pillStyle(this.state.invTab === 'ledger'),\n\n      reportTabs, reportTitle: rd.title, reportCols, reportRows, reportNote: rd.note, reportTimeBased,\n\n      clients, lowStock, products, posGrid, catChips, methodChips,\n      clientTxns, posTxns, posCart, posTotal,\n      recentCheckins, memHistory, ledger,\n\n      period, periodWord, periodCaption, revCaption, periods,\n      kpis, kpiCols, chartTopCols, chartBotCols, feedCols,\n      revSeries, gridLines, xLabels,\n      donutSegs, memTotal,\n      attendance, topProducts,\n      posFeed, feedExpiring, feedStock,\n      hasData: !empty, noData: empty,\n      dataTabStyle: segDemo(!empty), emptyTabStyle: segDemo(empty),\n      emptyBoxStyle, emptyRowStyle, emptyLabelText: 'no data yet',\n      showData: () => this.setState({ dashEmpty:false }),\n      showEmpty: () => this.setState({ dashEmpty:true }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Gym Manager Wireframes.standalone.dc"}
