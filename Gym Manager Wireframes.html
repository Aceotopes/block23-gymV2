  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();

              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.

        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';

      // would push the parser into quirks mode. DOMParser always emits a <head>

      // attributes through, so match the full opening tag.

      }

    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per

        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');

        }

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;

      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

  <script type="__bundler/template">
{"pages":{"Gym Manager Wireframes.standalone.dc":"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a79e0eab-242b-461d-9d78-6e286ed517a7\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n<style>\n*{box-sizing:border-box;}\nbody{margin:0;}\nbutton{font-family:inherit;}\n::-webkit-scrollbar{width:10px;height:10px;}\n::-webkit-scrollbar-thumb{background:#d4d4d8;border-radius:8px;border:3px solid transparent;background-clip:content-box;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"{{ rootStyle }}\">\n\n  <!-- ============ LOGIN ============ -->\n  <sc-if value=\"{{ isLogin }}\" hint-placeholder-val=\"{{ true }}\">\n    <div data-screen-label=\"Login\" style=\"flex:1;display:flex;align-items:center;justify-content:center;background:#f4f4f5;padding:24px;\">\n      <div style=\"width:360px;max-width:100%;background:#fff;border:1px solid #e4e4e7;border-radius:12px;padding:32px 28px;display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:4px;\">\n          <div style=\"width:46px;height:46px;border-radius:11px;background:#3f6fb5;color:#fff;display:flex;align-items:center;justify-content:center;font:700 22px system-ui;\">G<\u002Fdiv>\n          <div style=\"font:700 18px system-ui;color:#27272a;\">GymOS<\u002Fdiv>\n          <div style=\"font:500 11px ui-monospace,Menlo,monospace;letter-spacing:.12em;color:#a1a1aa;\">GYM MANAGEMENT · OWNER LOGIN<\u002Fdiv>\n        <\u002Fdiv>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;\">Username\n          <input placeholder=\"owner\" style=\"width:100%;border:1px solid #d4d4d8;border-radius:6px;padding:10px 11px;font:400 13px system-ui;color:#27272a;background:#fff;\">\n        <\u002Flabel>\n        <label style=\"display:flex;flex-direction:column;gap:6px;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;\">Password\n          <input type=\"password\" placeholder=\"••••••••\" style=\"width:100%;border:1px solid #d4d4d8;border-radius:6px;padding:10px 11px;font:400 13px system-ui;color:#27272a;background:#fff;\">\n        <\u002Flabel>\n        <button onclick=\"{{ login }}\" style=\"background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:6px;padding:11px 14px;font:600 14px system-ui;cursor:pointer;margin-top:4px;\">Log in<\u002Fbutton>\n        <div style=\"font:400 11px system-ui;color:#a1a1aa;text-align:center;\">Generic \"invalid credentials\" error on failure — never reveals which field was wrong.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ APP ============ -->\n  <sc-if value=\"{{ isApp }}\" hint-placeholder-val=\"{{ true }}\">\n\n    <!-- NAV -->\n    <nav style=\"{{ navContainerStyle }}\">\n      <sc-if value=\"{{ navBrand }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;align-items:center;gap:9px;padding:2px 6px 12px;margin-bottom:6px;border-bottom:1px solid #efefef;\">\n          <div style=\"width:28px;height:28px;border-radius:7px;background:#3f6fb5;color:#fff;display:flex;align-items:center;justify-content:center;font:700 14px system-ui;flex:none;\">G<\u002Fdiv>\n          <sc-if value=\"{{ brandFull }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"line-height:1.1;\"><div style=\"font:700 14px system-ui;color:#27272a;\">GymOS<\u002Fdiv><div style=\"font:500 9px ui-monospace,Menlo,monospace;color:#a1a1aa;letter-spacing:.1em;\">WIREFRAME<\u002Fdiv><\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n          <span style=\"{{ item.iconStyle }}\">{{ item.icon }}<\u002Fspan>\n          <sc-if value=\"{{ showLabel }}\" hint-placeholder-val=\"{{ true }}\"><span>{{ item.label }}<\u002Fspan><\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <!-- MAIN -->\n    <div style=\"{{ mainStyle }}\">\n\n      <!-- TOPBAR -->\n      <header style=\"flex:none;height:56px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid #e4e4e7;background:#fff;\">\n        <sc-if value=\"{{ topBrand }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"width:26px;height:26px;border-radius:6px;background:#3f6fb5;color:#fff;display:flex;align-items:center;justify-content:center;font:700 13px system-ui;flex:none;\">G<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isClientProfile }}\" hint-placeholder-val=\"{{ true }}\">\n          <button onclick=\"{{ goClients }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:6px 10px;font:500 12px system-ui;color:#52525b;cursor:pointer;\">← Clients<\u002Fbutton>\n        <\u002Fsc-if>\n        <div style=\"font:700 16px system-ui;color:#27272a;\">{{ screenTitle }}<\u002Fdiv>\n        <div style=\"flex:1;\"><\u002Fdiv>\n        <sc-if value=\"{{ showSearch }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:flex;align-items:center;gap:7px;width:240px;max-width:38vw;border:1px solid #d4d4d8;border-radius:7px;padding:7px 10px;background:#fafafa;\">\n            <span style=\"font:13px ui-monospace,Menlo,monospace;color:#a1a1aa;\">⌕<\u002Fspan>\n            <span style=\"font:400 12px system-ui;color:#a1a1aa;\">Search clients…<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <button onclick=\"{{ logout }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:7px;padding:7px 11px;font:500 12px system-ui;color:#52525b;cursor:pointer;\">Log out<\u002Fbutton>\n      <\u002Fheader>\n\n      <!-- CONTENT -->\n      <div style=\"flex:1;min-height:0;overflow:auto;padding:22px;background:#f4f4f5;\">\n\n        <!-- ===== DASHBOARD ===== -->\n        <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Dashboard\" style=\"display:flex;flex-direction:column;gap:16px;\">\n\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;\">\n              <div style=\"font:400 12px system-ui;color:#71717a;\">Monday, June 22, 2026 · {{ periodCaption }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\">\n                <div style=\"display:flex;border:1px solid #e4e4e7;border-radius:7px;overflow:hidden;\">\n                  <button onclick=\"{{ showData }}\" style=\"{{ dataTabStyle }}\">Sample data<\u002Fbutton>\n                  <button onclick=\"{{ showEmpty }}\" style=\"{{ emptyTabStyle }}\">Empty state<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"display:flex;border:1px solid #d4d4d8;border-radius:7px;overflow:hidden;\">\n                  <sc-for list=\"{{ periods }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <button onclick=\"{{ p.onClick }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- KPI strip -->\n            <div style=\"display:grid;grid-template-columns:{{ kpiCols }};gap:14px;\">\n              <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n                <div style=\"{{ k.cardStyle }}\">\n                  <span style=\"font:500 12px system-ui;color:#71717a;\">{{ k.label }}<\u002Fspan>\n                  <span style=\"{{ k.valueStyle }}\">{{ k.value }}<\u002Fspan>\n                  <span style=\"{{ k.deltaStyle }}\">{{ k.delta }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- charts row 1: revenue trend + membership donut -->\n            <div style=\"display:grid;grid-template-columns:{{ chartTopCols }};gap:16px;align-items:stretch;\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n                  <div style=\"font:600 13px system-ui;color:#3f3f46;\">Revenue trend<\u002Fdiv>\n                  <div style=\"display:flex;gap:14px;flex-wrap:wrap;\">\n                    <sc-for list=\"{{ revSeries }}\" as=\"s\" hint-placeholder-count=\"3\">\n                      <span style=\"display:inline-flex;align-items:center;gap:6px;font:500 11px system-ui;color:#52525b;\"><span style=\"{{ s.dot }}\"><\u002Fspan>{{ s.name }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:400 11px system-ui;color:#a1a1aa;margin:4px 0 12px;\">{{ revCaption }} · CLIENT_TRANSACTION + POS_SALE<\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <svg viewBox=\"0 0 520 190\" width=\"100%\" height=\"190\" preserveAspectRatio=\"none\" style=\"display:block;\">\n                    <sc-for list=\"{{ gridLines }}\" as=\"g\" hint-placeholder-count=\"5\">\n                      <line x1=\"8\" x2=\"512\" y1=\"{{ g.y }}\" y2=\"{{ g.y }}\" stroke=\"#f0f0f1\" stroke-width=\"1\"><\u002Fline>\n                    <\u002Fsc-for>\n                    <sc-for list=\"{{ revSeries }}\" as=\"s\" hint-placeholder-count=\"3\">\n                      <polyline points=\"{{ s.points }}\" fill=\"none\" stroke=\"{{ s.color }}\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpolyline>\n                    <\u002Fsc-for>\n                  <\u002Fsvg>\n                  <div style=\"display:flex;justify-content:space-between;margin-top:8px;\">\n                    <sc-for list=\"{{ xLabels }}\" as=\"x\" hint-placeholder-count=\"8\">\n                      <span style=\"font:500 10px ui-monospace,Menlo,monospace;color:#a1a1aa;\">{{ x }}<\u002Fspan>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyBoxStyle }}\">{{ emptyLabelText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"font:600 13px system-ui;color:#3f3f46;margin-bottom:14px;\">Membership status<\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;align-items:center;gap:18px;flex-wrap:wrap;\">\n                    <div style=\"position:relative;flex:none;\">\n                      <svg viewBox=\"0 0 120 120\" width=\"128\" height=\"128\">\n                        <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"#f0f0f1\" stroke-width=\"15\"><\u002Fcircle>\n                        <sc-for list=\"{{ donutSegs }}\" as=\"d\" hint-placeholder-count=\"3\">\n                          <circle cx=\"60\" cy=\"60\" r=\"48\" fill=\"none\" stroke=\"{{ d.color }}\" stroke-width=\"15\" stroke-dasharray=\"{{ d.dash }}\" stroke-dashoffset=\"{{ d.offset }}\" transform=\"rotate(-90 60 60)\"><\u002Fcircle>\n                        <\u002Fsc-for>\n                      <\u002Fsvg>\n                      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\">\n                        <span style=\"font:700 22px system-ui;color:#27272a;\">{{ memTotal }}<\u002Fspan>\n                        <span style=\"font:500 10px system-ui;color:#a1a1aa;\">members<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:10px;flex:1;min-width:120px;\">\n                      <sc-for list=\"{{ donutSegs }}\" as=\"d\" hint-placeholder-count=\"3\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;\">\n                          <span style=\"display:inline-flex;align-items:center;gap:7px;font:500 12px system-ui;color:#52525b;\"><span style=\"{{ d.dot }}\"><\u002Fspan>{{ d.name }}<\u002Fspan>\n                          <span style=\"font:600 13px system-ui;color:#27272a;\">{{ d.count }}<\u002Fspan>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyBoxStyle }}\">{{ emptyLabelText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- charts row 2: attendance + top products -->\n            <div style=\"display:grid;grid-template-columns:{{ chartBotCols }};gap:16px;align-items:stretch;\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n                  <div style=\"font:600 13px system-ui;color:#3f3f46;\">Daily attendance<\u002Fdiv>\n                  <div style=\"display:flex;gap:12px;\">\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;font:500 11px system-ui;color:#52525b;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#3f6fb5;display:inline-block;\"><\u002Fspan>Member<\u002Fspan>\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;font:500 11px system-ui;color:#52525b;\"><span style=\"width:9px;height:9px;border-radius:2px;background:#b45309;display:inline-block;\"><\u002Fspan>Walk-in<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font:400 11px system-ui;color:#a1a1aa;margin:4px 0 14px;\">Total check-ins per day · unique visitors counted separately<\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;align-items:flex-end;gap:10px;height:150px;\">\n                    <sc-for list=\"{{ attendance }}\" as=\"a\" hint-placeholder-count=\"7\">\n                      <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end;\">\n                        <div style=\"display:flex;align-items:flex-end;gap:3px;width:100%;justify-content:center;flex:1;\">\n                          <div style=\"width:42%;height:{{ a.memberH }};background:#3f6fb5;border-radius:3px 3px 0 0;min-height:2px;\"><\u002Fdiv>\n                          <div style=\"width:42%;height:{{ a.walkH }};background:#b45309;border-radius:3px 3px 0 0;min-height:2px;\"><\u002Fdiv>\n                        <\u002Fdiv>\n                        <span style=\"font:500 10px ui-monospace,Menlo,monospace;color:#a1a1aa;\">{{ a.label }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyBoxStyle }}\">{{ emptyLabelText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"font:600 13px system-ui;color:#3f3f46;\">Top products<\u002Fdiv>\n                <div style=\"font:400 11px system-ui;color:#a1a1aa;margin:4px 0 16px;\">By units / servings sold · {{ periodWord }}<\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:13px;\">\n                    <sc-for list=\"{{ topProducts }}\" as=\"p\" hint-placeholder-count=\"5\">\n                      <div style=\"display:flex;flex-direction:column;gap:5px;\">\n                        <div style=\"display:flex;align-items:center;justify-content:space-between;\">\n                          <span style=\"font:500 12px system-ui;color:#3f3f46;\">{{ p.name }}<\u002Fspan>\n                          <span style=\"font:600 12px ui-monospace,Menlo,monospace;color:#71717a;\">{{ p.units }}<\u002Fspan>\n                        <\u002Fdiv>\n                        <div style=\"height:9px;background:#f4f4f5;border-radius:5px;overflow:hidden;\">\n                          <div style=\"height:100%;width:{{ p.widthPct }};background:#3f6fb5;border-radius:5px;\"><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyBoxStyle }}\">{{ emptyLabelText }}<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- live feed panels -->\n            <div style=\"display:grid;grid-template-columns:{{ feedCols }};gap:16px;align-items:start;\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                  <div style=\"font:600 13px system-ui;color:#3f3f46;\">Recent POS sales<\u002Fdiv>\n                  <button onclick=\"{{ goPos }}\" style=\"background:none;border:none;font:500 12px system-ui;color:#3f6fb5;cursor:pointer;padding:0;\">View all →<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <sc-for list=\"{{ posFeed }}\" as=\"t\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #f4f4f5;\">\n                      <div style=\"width:34px;height:34px;flex:none;border-radius:8px;background:#eef3fb;color:#3f6fb5;display:flex;align-items:center;justify-content:center;font:14px ui-monospace,Menlo,monospace;\">▤<\u002Fdiv>\n                      <div style=\"flex:1;min-width:0;\">\n                        <div style=\"font:500 13px system-ui;color:#27272a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ t.summary }}<\u002Fdiv>\n                        <div style=\"font:400 11px system-ui;color:#a1a1aa;\">{{ t.method }} · {{ t.ago }}<\u002Fdiv>\n                      <\u002Fdiv>\n                      <span style=\"font:600 13px system-ui;color:#3f3f46;white-space:nowrap;\">{{ t.amount }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyRowStyle }}\">No sales yet<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                  <div style=\"font:600 13px system-ui;color:#3f3f46;\">Expiring soon<\u002Fdiv>\n                  <button onclick=\"{{ goClients }}\" style=\"background:none;border:none;font:500 12px system-ui;color:#3f6fb5;cursor:pointer;padding:0;\">View all →<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <sc-for list=\"{{ feedExpiring }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #f4f4f5;\">\n                      <div style=\"display:flex;align-items:center;gap:9px;min-width:0;\">\n                        <span style=\"{{ m.dotStyle }}\"><\u002Fspan>\n                        <div style=\"min-width:0;\">\n                          <div style=\"font:500 13px system-ui;color:#27272a;\">{{ m.name }}<\u002Fdiv>\n                          <div style=\"font:400 11px system-ui;color:#a1a1aa;\">ends {{ m.ends }}<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                      <span style=\"{{ m.daysStyle }}\">{{ m.days }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyRowStyle }}\">No memberships expiring<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n                  <div style=\"font:600 13px system-ui;color:#3f3f46;\">Inventory alerts<\u002Fdiv>\n                  <button onclick=\"{{ goInventory }}\" style=\"background:none;border:none;font:500 12px system-ui;color:#3f6fb5;cursor:pointer;padding:0;\">View all →<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hasData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <sc-for list=\"{{ feedStock }}\" as=\"p\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid #f4f4f5;\">\n                      <div><div style=\"font:500 13px system-ui;color:#27272a;\">{{ p.name }}<\u002Fdiv><div style=\"font:400 11px system-ui;color:#a1a1aa;\">threshold {{ p.threshold }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"{{ p.statusStyle }}\">{{ p.remaining }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noData }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"{{ emptyRowStyle }}\">Stock levels healthy<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== CLIENTS ===== -->\n        <sc-if value=\"{{ isClients }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Clients\">\n            <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;\">\n              <div style=\"display:flex;align-items:center;gap:7px;flex:1;min-width:200px;border:1px solid #d4d4d8;border-radius:7px;padding:9px 11px;background:#fff;\">\n                <span style=\"font:13px ui-monospace,Menlo,monospace;color:#a1a1aa;\">⌕<\u002Fspan>\n                <span style=\"font:400 13px system-ui;color:#a1a1aa;\">Search by name (partial match, &lt;2s)…<\u002Fspan>\n              <\u002Fdiv>\n              <button onclick=\"{{ openMembership }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:9px 14px;font:500 13px system-ui;color:#27272a;cursor:pointer;\">+ Add membership<\u002Fbutton>\n              <button onclick=\"{{ viewClient }}\" style=\"background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:6px;padding:9px 14px;font:600 13px system-ui;cursor:pointer;\">+ Register client<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"background:#fffbeb;border:1px solid #fde68a;border-radius:7px;padding:9px 12px;font:400 12px system-ui;color:#b45309;margin-bottom:14px;\">⚠ On register, a fuzzy name check warns of possible duplicates (\"John Cruz\" ×2) but never blocks — owner decides.<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n              <sc-for list=\"{{ clients }}\" as=\"c\" hint-placeholder-count=\"5\">\n                    <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n                <thead><tr>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Name<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Contact<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Status<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Last visit<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Joined<\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody>\n                  <tr onclick=\"{{ viewClient }}\" style=\"cursor:pointer;\">\n                      <td style=\"padding:12px 14px;font:600 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;\">{{ c.name }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ c.contact }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><span style=\"{{ c.statusStyle }}\">{{ c.status }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ c.last }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:400 13px system-ui;color:#a1a1aa;border-bottom:1px solid #f4f4f5;\">{{ c.joined }}<\u002Ftd>\n                    <\u002Ftr>\n                  \n                <\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== CLIENT PROFILE ===== -->\n        <sc-if value=\"{{ isClientProfile }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Client Profile\" style=\"display:flex;flex-direction:column;gap:16px;\">\n            <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:20px;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;\">\n              <div style=\"width:56px;height:56px;border-radius:50%;background:#f4f4f5;border:1px solid #e4e4e7;display:flex;align-items:center;justify-content:center;font:700 20px system-ui;color:#a1a1aa;flex:none;\">MS<\u002Fdiv>\n              <div style=\"flex:1;min-width:180px;\">\n                <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;\"><span style=\"font:700 18px system-ui;color:#27272a;\">Maria Santos<\u002Fspan><span style=\"display:inline-block;padding:2px 9px;border-radius:999px;font:600 11px system-ui;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;\">Active member<\u002Fspan><\u002Fdiv>\n                <div style=\"font:400 13px system-ui;color:#71717a;margin-top:5px;\">0917 555 0142 · joined Nov 3, 2024 · membership ends Jul 20, 2026<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n                <button style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:8px 12px;font:500 12px system-ui;color:#52525b;cursor:pointer;\">Edit<\u002Fbutton>\n                <button onclick=\"{{ openMembership }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:8px 12px;font:500 12px system-ui;color:#52525b;cursor:pointer;\">Renew<\u002Fbutton>\n                <button onclick=\"{{ goAttendance }}\" style=\"background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:6px;padding:8px 12px;font:600 12px system-ui;cursor:pointer;\">Check in<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;gap:6px;border-bottom:1px solid #e4e4e7;\">\n              <button onclick=\"{{ setProfileMembership }}\" style=\"{{ tabMembershipStyle }}\">Membership history<\u002Fbutton>\n              <button onclick=\"{{ setProfileAttendance }}\" style=\"{{ tabAttendanceStyle }}\">Attendance history<\u002Fbutton>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ tabMembership }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ memHistory }}\" as=\"m\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f4f4f5;gap:12px;flex-wrap:wrap;\">\n                    <div><div style=\"font:600 13px system-ui;color:#27272a;\">{{ m.plan }}<\u002Fdiv><div style=\"font:400 12px system-ui;color:#a1a1aa;\">{{ m.dates }}<\u002Fdiv><\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"font:600 13px system-ui;color:#3f3f46;\">{{ m.price }}<\u002Fspan><span style=\"{{ m.statusStyle }}\">{{ m.status }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"padding:11px 16px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">renewal chain preserved via renewed_from — old records never overwritten<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ tabAttendance }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ recentCheckins }}\" as=\"a\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #f4f4f5;gap:12px;flex-wrap:wrap;\">\n                    <div style=\"font:500 13px system-ui;color:#27272a;\">{{ a.time }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:14px;\"><span style=\"font:400 12px system-ui;color:#a1a1aa;\">{{ a.plan }}<\u002Fspan><span style=\"{{ a.statusStyle }}\">{{ a.type }}<\u002Fspan><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"padding:11px 16px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">membership_id snapshotted at check-in · retained even after expiry or soft-delete<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== ATTENDANCE / CHECK-IN ===== -->\n        <sc-if value=\"{{ isAttendance }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Check-in\" style=\"display:grid;grid-template-columns:{{ twoColTemplate }};gap:16px;align-items:start;\">\n            <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n              <div style=\"font:600 13px system-ui;color:#3f3f46;margin-bottom:12px;\">Record a check-in<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:7px;border:1px solid #d4d4d8;border-radius:7px;padding:10px 12px;background:#fafafa;margin-bottom:14px;\">\n                <span style=\"font:13px ui-monospace,Menlo,monospace;color:#a1a1aa;\">⌕<\u002Fspan>\n                <span style=\"font:400 13px system-ui;color:#52525b;\">Maria Santos<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"border:1px solid #a7f3d0;background:#ecfdf5;border-radius:8px;padding:14px;margin-bottom:14px;\">\n                <div style=\"font:600 13px system-ui;color:#047857;\">✓ Active membership found<\u002Fdiv>\n                <div style=\"font:400 12px system-ui;color:#3f3f46;margin-top:4px;\">1 Month · ends Jul 20 · visit auto-tagged <b>MEMBER<\u002Fb>, fee ₱0, snapshot-linked to membership.<\u002Fdiv>\n              <\u002Fdiv>\n              <button style=\"width:100%;background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:7px;padding:12px;font:600 14px system-ui;cursor:pointer;\">Check in — Member (₱0)<\u002Fbutton>\n              <div style=\"border-top:1px dashed #e4e4e7;margin:16px 0;\"><\u002Fdiv>\n              <div style=\"font:400 12px system-ui;color:#71717a;line-height:1.6;\">No active membership → visit defaults to <b>WALK-IN<\u002Fb>, prompts for fee (default ₱60, overridable) and records a <b>CLIENT_TRANSACTION<\u002Fb> (walk-in fee, payment method required). Name not found → quick-create client (name only).<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:18px;\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;\">\n                <div style=\"font:600 13px system-ui;color:#3f3f46;\">Today's check-ins<\u002Fdiv>\n                <span style=\"font:500 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">filter: date · type<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ recentCheckins }}\" as=\"a\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f4f4f5;gap:10px;\">\n                  <div><div style=\"font:500 13px system-ui;color:#27272a;\">{{ a.name }}<\u002Fdiv><div style=\"font:400 11px system-ui;color:#a1a1aa;\">{{ a.time }} · {{ a.plan }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"{{ a.statusStyle }}\">{{ a.type }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <div style=\"font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;margin-top:10px;\">Same-day repeat check-ins allowed · reports split total vs unique · edit time via updated_at, no silent overwrite.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== CLIENT PAYMENTS ===== -->\n        <sc-if value=\"{{ isPayments }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Client Payments\">\n            <div style=\"background:#eef3fb;border:1px solid #cdddf3;border-radius:7px;padding:9px 12px;font:400 12px system-ui;color:#2c4f80;margin-bottom:14px;\">Client payments = membership fees + walk-in fees only — every record requires a client. Created as a byproduct of check-in (Flow 3) and membership flows (Flows 5–6). Product sales live in <b>POS<\u002Fb>.<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;\">\n              <span style=\"font:500 12px system-ui;color:#52525b;border:1px solid #d4d4d8;border-radius:6px;padding:8px 11px;background:#fff;\">Jun 1 – Jun 22<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:7px;flex:1;min-width:160px;border:1px solid #d4d4d8;border-radius:6px;padding:8px 11px;background:#fff;\">\n                <span style=\"font:13px ui-monospace,Menlo,monospace;color:#a1a1aa;\">⌕<\u002Fspan><span style=\"font:400 12px system-ui;color:#a1a1aa;\">Filter by client…<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                <sc-for list=\"{{ methodChips }}\" as=\"m\" hint-placeholder-count=\"5\">\n                  <span style=\"{{ m.style }}\">{{ m.label }}<\u002Fspan>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n              <sc-for list=\"{{ clientTxns }}\" as=\"t\" hint-placeholder-count=\"5\">\n                    <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n                <thead><tr>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Date<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Client<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Line items<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Total<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Method<\u002Fth>\n                  <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Status<\u002Fth>\n                  <th style=\"border-bottom:1px solid #e4e4e7;\"><\u002Fth>\n                <\u002Ftr><\u002Fthead>\n                <tbody>\n                  <tr>\n                      <td style=\"padding:12px 14px;font:400 12px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;white-space:nowrap;\">{{ t.date }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:500 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;\">{{ t.client }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:400 13px system-ui;color:#52525b;border-bottom:1px solid #f4f4f5;\">{{ t.summary }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:600 13px system-ui;color:#3f3f46;border-bottom:1px solid #f4f4f5;\">{{ t.total }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ t.method }}<\u002Ftd>\n                      <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><span style=\"{{ t.statusStyle }}\">{{ t.status }}<\u002Fspan><\u002Ftd>\n                      <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><button onclick=\"{{ openVoid }}\" style=\"{{ t.voidStyle }}\">{{ t.voidLabel }}<\u002Fbutton><\u002Ftd>\n                    <\u002Ftr>\n                  \n                <\u002Ftbody>\n              <\u002Ftable>\n              <div style=\"padding:11px 14px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">Voided rows excluded from revenue totals but never deleted — kept with reason. Voiding a payment does not cancel the membership.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== POS ===== -->\n        <sc-if value=\"{{ isPos }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"POS\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;\">\n              <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                <button onclick=\"{{ setPosRegister }}\" style=\"{{ posRegisterStyle }}\">Point of sale<\u002Fbutton>\n                <button onclick=\"{{ setPosCatalog }}\" style=\"{{ posCatalogStyle }}\">Products<\u002Fbutton>\n                <button onclick=\"{{ setPosHistory }}\" style=\"{{ posHistoryStyle }}\">Sales history<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-if value=\"{{ posCatalog }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ openProduct }}\" style=\"background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:6px;padding:9px 14px;font:600 13px system-ui;cursor:pointer;\">+ New product<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <!-- POS register: grid + cart -->\n            <sc-if value=\"{{ posRegister }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:grid;grid-template-columns:{{ posTemplate }};gap:16px;align-items:start;\">\n                <div style=\"display:flex;flex-direction:column;gap:14px;\">\n                  <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:16px;\">\n                    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap;\">\n                      <div style=\"display:flex;align-items:center;gap:7px;flex:1;min-width:160px;border:1px solid #d4d4d8;border-radius:7px;padding:9px 11px;background:#fafafa;\">\n                        <span style=\"font:13px ui-monospace,Menlo,monospace;color:#a1a1aa;\">⌕<\u002Fspan><span style=\"font:400 13px system-ui;color:#a1a1aa;\">Search products…<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                        <sc-for list=\"{{ catChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                          <span style=\"{{ c.style }}\">{{ c.label }}<\u002Fspan>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:{{ gridCols }};gap:10px;\">\n                      <sc-for list=\"{{ posGrid }}\" as=\"p\" hint-placeholder-count=\"6\">\n                        <div style=\"border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;cursor:pointer;background:#fff;\">\n                          <div style=\"{{ p.imgStyle }}\"><span style=\"font:500 9px ui-monospace,Menlo,monospace;color:#9b9ba3;background:rgba(255,255,255,.7);padding:2px 5px;border-radius:3px;\">{{ p.imgLabel }}<\u002Fspan><\u002Fdiv>\n                          <div style=\"padding:9px 10px;\">\n                            <div style=\"font:600 12px system-ui;color:#27272a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ p.name }}<\u002Fdiv>\n                            <div style=\"font:500 12px ui-monospace,Menlo,monospace;color:#3f6fb5;margin-top:3px;\">{{ p.priceLabel }}<\u002Fdiv>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px 14px;font:400 12px system-ui;color:#b91c1c;\">Stock guard: a quantity over available stock is <b>blocked<\u002Fb> by default. \"Force sale\" is a separate explicit confirmation, logged as a flagged inventory adjustment.<\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- cart -->\n                <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;padding:16px;\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;\">\n                    <div style=\"font:600 13px system-ui;color:#3f3f46;\">Cart<\u002Fdiv>\n                    <span style=\"font:500 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">no client required<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font:400 11px system-ui;color:#a1a1aa;margin-bottom:12px;\">client_id = null on POS_SALE<\u002Fdiv>\n                  <sc-for list=\"{{ posCart }}\" as=\"i\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid #f4f4f5;gap:10px;\">\n                      <div style=\"min-width:0;\"><div style=\"font:500 13px system-ui;color:#27272a;\">{{ i.desc }}<\u002Fdiv><div style=\"font:400 11px system-ui;color:#a1a1aa;\">{{ i.meta }}<\u002Fdiv><\u002Fdiv>\n                      <div style=\"display:flex;align-items:center;gap:8px;\">\n                        <div style=\"display:flex;align-items:center;border:1px solid #d4d4d8;border-radius:6px;overflow:hidden;\">\n                          <span style=\"font:600 13px system-ui;color:#52525b;padding:3px 8px;cursor:pointer;\">−<\u002Fspan>\n                          <span style=\"font:600 12px ui-monospace,Menlo,monospace;color:#27272a;padding:3px 4px;min-width:18px;text-align:center;\">{{ i.qty }}<\u002Fspan>\n                          <span style=\"font:600 13px system-ui;color:#52525b;padding:3px 8px;cursor:pointer;\">+<\u002Fspan>\n                        <\u002Fdiv>\n                        <span style=\"font:600 13px system-ui;color:#3f3f46;min-width:48px;text-align:right;\">{{ i.amount }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 0 6px;\">\n                    <span style=\"font:700 14px system-ui;color:#27272a;\">Total<\u002Fspan><span style=\"font:700 18px system-ui;color:#27272a;\">{{ posTotal }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;margin:10px 0 7px;\">Payment method<\u002Fdiv>\n                  <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;\">\n                    <span style=\"font:500 12px system-ui;color:#3f6fb5;background:#eef3fb;border:1px solid #cdddf3;border-radius:6px;padding:6px 11px;\">Cash<\u002Fspan>\n                    <span style=\"font:500 12px system-ui;color:#52525b;background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:6px 11px;\">GCash<\u002Fspan>\n                    <span style=\"font:500 12px system-ui;color:#52525b;background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:6px 11px;\">Card<\u002Fspan>\n                    <span style=\"font:500 12px system-ui;color:#52525b;background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:6px 11px;\">Other<\u002Fspan>\n                  <\u002Fdiv>\n                  <button style=\"width:100%;background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:7px;padding:12px;font:600 14px system-ui;cursor:pointer;\">Checkout<\u002Fbutton>\n                  <div style=\"font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;margin-top:9px;text-align:center;\">Price snapshot at add-to-cart · each line decrements stock<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- POS catalog -->\n            <sc-if value=\"{{ posCatalog }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;\">\n                <sc-for list=\"{{ catChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n                  <span style=\"{{ c.style }}\">{{ c.label }}<\u002Fspan>\n                <\u002Fsc-for>\n                <span style=\"font:500 12px system-ui;color:#52525b;background:#fff;border:1px dashed #d4d4d8;border-radius:6px;padding:6px 11px;cursor:pointer;\">+ Category<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"6\">\n                      <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n                  <thead><tr>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Product<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Category<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Type<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Sell<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Cost<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Status<\u002Fth>\n                    <th style=\"border-bottom:1px solid #e4e4e7;\"><\u002Fth>\n                  <\u002Ftr><\u002Fthead>\n                  <tbody>\n                    <tr>\n                        <td style=\"padding:12px 14px;font:600 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;\"><div style=\"display:flex;align-items:center;gap:9px;\"><span style=\"width:26px;height:26px;flex:none;border-radius:6px;background:#f1f1f3;display:flex;align-items:center;justify-content:center;font:10px ui-monospace,Menlo,monospace;color:#9b9ba3;\">▤<\u002Fspan>{{ p.name }}<\u002Fdiv><\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ p.cat }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 12px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ p.typeLabel }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:500 13px system-ui;color:#3f3f46;border-bottom:1px solid #f4f4f5;\">{{ p.sell }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#a1a1aa;border-bottom:1px solid #f4f4f5;\">{{ p.cost }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><span style=\"{{ p.activeStyle }}\">{{ p.activeLabel }}<\u002Fspan><\u002Ftd>\n                        <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><button onclick=\"{{ openProduct }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:5px 10px;font:500 12px system-ui;color:#52525b;cursor:pointer;\">Edit<\u002Fbutton><\u002Ftd>\n                      <\u002Ftr>\n                    \n                  <\u002Ftbody>\n                <\u002Ftable>\n                <div style=\"padding:11px 14px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">Archived products leave the POS grid but keep full sales &amp; inventory history. cost_price stored for future margin reporting.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- POS history -->\n            <sc-if value=\"{{ posHistory }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;\">\n                <span style=\"font:500 12px system-ui;color:#52525b;border:1px solid #d4d4d8;border-radius:6px;padding:8px 11px;background:#fff;\">Jun 1 – Jun 22<\u002Fspan>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                  <sc-for list=\"{{ methodChips }}\" as=\"m\" hint-placeholder-count=\"5\">\n                    <span style=\"{{ m.style }}\">{{ m.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ posTxns }}\" as=\"t\" hint-placeholder-count=\"5\">\n                      <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n                  <thead><tr>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Date<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Items<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Total<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Method<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Status<\u002Fth>\n                    <th style=\"border-bottom:1px solid #e4e4e7;\"><\u002Fth>\n                  <\u002Ftr><\u002Fthead>\n                  <tbody>\n                    <tr>\n                        <td style=\"padding:12px 14px;font:400 12px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;white-space:nowrap;\">{{ t.date }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;\">{{ t.summary }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:600 13px system-ui;color:#3f3f46;border-bottom:1px solid #f4f4f5;\">{{ t.total }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ t.method }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><span style=\"{{ t.statusStyle }}\">{{ t.status }}<\u002Fspan><\u002Ftd>\n                        <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><button onclick=\"{{ openVoid }}\" style=\"{{ t.voidStyle }}\">{{ t.voidLabel }}<\u002Fbutton><\u002Ftd>\n                      <\u002Ftr>\n                    \n                  <\u002Ftbody>\n                <\u002Ftable>\n                <div style=\"padding:11px 14px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">Void is additive — original SALE entries stay in the ledger, reversal logs new ADJUSTMENT rows. Reason required.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== INVENTORY ===== -->\n        <sc-if value=\"{{ isInventory }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Inventory\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;\">\n              <div style=\"display:flex;gap:6px;\">\n                <button onclick=\"{{ setInvProducts }}\" style=\"{{ invProductsStyle }}\">Current stock<\u002Fbutton>\n                <button onclick=\"{{ setInvLedger }}\" style=\"{{ invLedgerStyle }}\">Movement ledger<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;gap:8px;\">\n                <button onclick=\"{{ openAdjust }}\" style=\"background:#fff;border:1px solid #d4d4d8;border-radius:6px;padding:9px 14px;font:500 13px system-ui;color:#27272a;cursor:pointer;\">Manual adjustment<\u002Fbutton>\n                <button onclick=\"{{ openRestock }}\" style=\"background:#3f6fb5;color:#fff;border:1px solid #3f6fb5;border-radius:6px;padding:9px 14px;font:600 13px system-ui;cursor:pointer;\">Record restock<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ invProducts }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ products }}\" as=\"p\" hint-placeholder-count=\"6\">\n                      <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;\">\n                  <thead><tr>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Product<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Category<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Type<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Threshold<\u002Fth>\n                    <th style=\"text-align:left;font:600 11px ui-monospace,Menlo,monospace;letter-spacing:.05em;text-transform:uppercase;color:#a1a1aa;padding:11px 14px;border-bottom:1px solid #e4e4e7;\">Stock<\u002Fth>\n                  <\u002Ftr><\u002Fthead>\n                  <tbody>\n                    <tr>\n                        <td style=\"padding:12px 14px;font:600 13px system-ui;color:#27272a;border-bottom:1px solid #f4f4f5;\">{{ p.name }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ p.cat }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 12px system-ui;color:#71717a;border-bottom:1px solid #f4f4f5;\">{{ p.typeLabel }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;font:400 13px system-ui;color:#a1a1aa;border-bottom:1px solid #f4f4f5;\">{{ p.threshold }}<\u002Ftd>\n                        <td style=\"padding:12px 14px;border-bottom:1px solid #f4f4f5;\"><span style=\"{{ p.stockStyle }}\">{{ p.stock }}<\u002Fspan><\u002Ftd>\n                      <\u002Ftr>\n                    \n                  <\u002Ftbody>\n                <\u002Ftable>\n                <div style=\"padding:11px 14px;font:400 11px ui-monospace,Menlo,monospace;color:#a1a1aa;\">Serving-based products show \"X of Y servings remaining\" · low stock flagged against threshold.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ invLedger }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff;border:1px solid #e4e4e7;border-radius:8px;overflow:hidden;\">\n                <sc-for list=\"{{ ledger }}\" as=\"l\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f4f4f5;gap:12px;flex-wrap:wrap;\">\n
