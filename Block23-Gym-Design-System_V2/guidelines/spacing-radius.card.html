<!-- @dsCard group="Spacing" viewport="700x160" name="Radius scale" subtitle="7 → 20px, then full pills — square only for table edges" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;background:var(--b23-bg);display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:70px;height:70px;background:var(--b23-surface-2);border:1px solid var(--b23-border-2)}
  .n{font:600 12px var(--b23-sans);color:var(--b23-fg)}
  .h{font:400 10px var(--b23-mono);color:var(--b23-faint)}
</style></head><body>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-sm)"></div><span class="n">sm</span><span class="h">7px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-md)"></div><span class="n">md</span><span class="h">9px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-lg)"></div><span class="n">lg</span><span class="h">11px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-xl)"></div><span class="n">xl</span><span class="h">14px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-2xl)"></div><span class="n">2xl</span><span class="h">16px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-3xl)"></div><span class="n">3xl</span><span class="h">20px</span></div>
  <div class="u"><div class="box" style="border-radius:var(--b23-radius-pill)"></div><span class="n">pill</span><span class="h">999px</span></div>
</body></html>
