<!-- @dsCard group="Brand" viewport="700x150" name="Wordmark" subtitle="Yellow '23' tile + Block 23 — there is no logo file" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:26px;background:var(--b23-bg);display:flex;align-items:center;gap:40px;flex-wrap:wrap}
  .mark{display:inline-flex;align-items:center;gap:13px}
  .tile{width:44px;height:44px;border-radius:13px;background:var(--b23-grad-logo);display:flex;align-items:center;justify-content:center;font:700 21px var(--b23-display);color:var(--b23-primary-on);box-shadow:var(--b23-glow-logo)}
  .name{font:600 22px var(--b23-display);letter-spacing:-.01em;color:var(--b23-fg)}
  .sub{font:500 9px var(--b23-mono);letter-spacing:.22em;color:var(--b23-faint);margin-top:4px}
  .tile-sm{width:30px;height:30px;border-radius:9px;background:var(--b23-grad-logo);display:flex;align-items:center;justify-content:center;font:700 14px var(--b23-display);color:var(--b23-primary-on);box-shadow:var(--b23-glow-logo)}
</style></head><body>
  <div class="mark">
    <div class="tile">23</div>
    <div><div class="name">Block 23</div><div class="sub">GYM · OPERATIONS</div></div>
  </div>
  <div class="mark"><div class="tile-sm">23</div><div class="name" style="font-size:16px">Block 23</div></div>
</body></html>
