<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid — no off-scale values" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--b23-bg);display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
  .u{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--b23-grad-primary);border-radius:4px;width:100%}
  .box{width:40px;display:flex;flex-direction:column;align-items:center}
  .n{font:600 12px var(--b23-mono);color:var(--b23-fg)}
  .h{font:400 10px var(--b23-mono);color:var(--b23-faint)}
</style></head><body>
  <div class="box"><div style="height:4px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">1</span><span class="h">4</span></div></div>
  <div class="box"><div style="height:8px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">2</span><span class="h">8</span></div></div>
  <div class="box"><div style="height:12px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">3</span><span class="h">12</span></div></div>
  <div class="box"><div style="height:16px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">4</span><span class="h">16</span></div></div>
  <div class="box"><div style="height:24px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">6</span><span class="h">24</span></div></div>
  <div class="box"><div style="height:32px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">8</span><span class="h">32</span></div></div>
  <div class="box"><div style="height:48px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">12</span><span class="h">48</span></div></div>
  <div class="box"><div style="height:64px" class="bar"></div><div class="u" style="margin-top:7px"><span class="n">16</span><span class="h">64</span></div></div>
</body></html>
