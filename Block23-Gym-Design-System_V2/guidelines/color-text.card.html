<!-- @dsCard group="Colors" viewport="700x150" name="Text ramp" subtitle="Four warm greys, from primary text down to faint meta" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;background:var(--b23-bg);display:flex;flex-direction:column;gap:12px}
  .r{display:flex;align-items:baseline;gap:14px}
  .t{font:600 20px var(--b23-display)}
  .m{font:500 12px var(--b23-mono);color:var(--b23-faint);margin-left:auto}
  .tag{font:500 11px var(--b23-mono);color:var(--b23-faint);width:78px}
</style></head><body>
  <div class="r"><span class="tag">fg</span><span class="t" style="color:var(--b23-fg)">Good evening, Marcus</span><span class="m">#F3F0EA</span></div>
  <div class="r"><span class="tag">fg-2</span><span class="t" style="color:var(--b23-fg-2)">Block 23 is running</span><span class="m">#CAC4B8</span></div>
  <div class="r"><span class="tag">muted</span><span class="t" style="color:var(--b23-muted)">41 transactions today</span><span class="m">#9C9488</span></div>
  <div class="r"><span class="tag">faint</span><span class="t" style="color:var(--b23-faint)">ASIA / MANILA · OWNER</span><span class="m">#6E675C</span></div>
</body></html>
