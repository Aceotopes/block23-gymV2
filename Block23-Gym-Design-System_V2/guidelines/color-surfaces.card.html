<!-- @dsCard group="Colors" viewport="700x150" name="Canvas & surfaces" subtitle="Warm near-black — surfaces step up in warmth, not brightness" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:18px;background:var(--b23-bg);display:flex;gap:12px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:12px;padding:12px;border:1px solid var(--b23-border);display:flex;flex-direction:column;justify-content:flex-end;height:104px}
  .n{font:600 12px var(--b23-sans);color:var(--b23-fg)}
  .h{font:500 11px var(--b23-mono);color:var(--b23-muted);margin-top:2px}
</style></head><body>
  <div class="sw" style="background:var(--b23-black)"><span class="n" style="color:var(--b23-fg-2)">black</span><span class="h">#050504</span></div>
  <div class="sw" style="background:var(--b23-bg)"><span class="n">canvas</span><span class="h">#100F0D</span></div>
  <div class="sw" style="background:var(--b23-surface)"><span class="n">surface</span><span class="h">#1A1815</span></div>
  <div class="sw" style="background:var(--b23-surface-2)"><span class="n">surface-2</span><span class="h">#221F1A</span></div>
  <div class="sw" style="background:var(--b23-surface-3)"><span class="n">surface-3</span><span class="h">#2B2721</span></div>
  <div class="sw" style="background:var(--b23-surface);border-color:var(--b23-border-2)"><span class="n" style="color:var(--b23-muted)">border-2</span><span class="h">#3C372F</span></div>
</body></html>
